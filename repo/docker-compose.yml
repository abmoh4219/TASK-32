services:
  setup:
    image: alpine:3.18
    volumes:
      - ".:/workspace"
    # On first run, generate a fresh .env with random 48-byte secrets. This
    # removes the shipped insecure defaults while keeping `docker compose up`
    # working out of the box. Subsequent runs leave the existing .env alone.
    command: >
      sh -c "set -e;
             if [ ! -f /workspace/.env ]; then
               cp /workspace/.env.example /workspace/.env;
               ENC=$$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48);
               SIG=$$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48);
               sed -i \"s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=$$ENC|\" /workspace/.env;
               sed -i \"s|^SIGNING_KEY=.*|SIGNING_KEY=$$SIG|\" /workspace/.env;
               echo 'First run: .env created with random secrets';
             else
               echo '.env exists';
             fi"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/data/scholarvault.db}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SIGNING_KEY: ${SIGNING_KEY}
      RUST_LOG: ${RUST_LOG:-info}
      HOST: 0.0.0.0
      PORT: 3000
      # APP_ENV=dev keeps Docker/local HTTP working by default. For real
      # deployments set APP_ENV=production and either TRUSTED_TLS_PROXY=true
      # (TLS terminated upstream) or COOKIE_SECURE=true.
      APP_ENV: ${APP_ENV:-dev}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - app-data:/app/data
      - evidence-files:/app/evidence
      - backups:/app/backups
    depends_on:
      setup:
        condition: service_completed_successfully

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:///tmp/scholarvault_test.db
      ENCRYPTION_KEY: test-encryption-key-exactly-32bytes
      SIGNING_KEY: test-signing-key-for-tests-only!!!!
      RUST_LOG: error
    command: ["sh", "run_tests.sh"]

volumes:
  app-data: {}
  evidence-files: {}
  backups: {}
